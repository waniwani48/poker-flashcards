<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Poker暗記">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1d9e75">
<link rel="apple-touch-icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="%231d9e75"/><text x="50" y="72" font-size="58" text-anchor="middle" fill="white">&#9824;</text></svg>'>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="%231d9e75"/><text x="50" y="72" font-size="58" text-anchor="middle" fill="white">&#9824;</text></svg>'>
<title>Poker 暗記</title>
<style>
:root{
--page:#faf9f5;--bp:#ffffff;--bs:#f1efe8;--tp:#2c2c2a;--ts:#5f5e5a;--tt:#8a8980;
--bd:rgba(0,0,0,0.12);--rmd:8px;--rlg:14px;
--td:#a32d2d;--bgd:#fbeaea;--tw:#854f0b;--bgw:#faeeda;--tk:#0f6e56;--bgk:#e1f5ee;
}
@media(prefers-color-scheme:dark){:root{
--page:#1f1e1c;--bp:#2b2a27;--bs:#37352f;--tp:#f0eee6;--ts:#b4b2a9;--tt:#8a8980;
--bd:rgba(255,255,255,0.14);
--td:#f09595;--bgd:#3a2020;--tw:#efb05a;--bgw:#3a2f18;--tk:#5dcaa5;--bgk:#123a30;
}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,system-ui,"Hiragino Sans",sans-serif;background:var(--page);color:var(--tp);-webkit-font-smoothing:antialiased;}
.wrap{max-width:480px;margin:0 auto;padding:18px 16px calc(24px + env(safe-area-inset-bottom));}
h1{font-size:18px;font-weight:500;margin:6px 0 14px;display:flex;align-items:center;gap:8px;}
h1 .dot{width:22px;height:22px;border-radius:6px;background:#1d9e75;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;}
button{font-family:inherit;cursor:pointer;}
.card{background:var(--bp);border:0.5px solid var(--bd);border-radius:var(--rlg);}
.grade{flex:1;border:0.5px solid var(--bd);border-radius:var(--rmd);padding:14px 4px;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.gsym{font-size:20px;line-height:1;}
.tag{font-size:12px;color:var(--tt);background:var(--bs);padding:3px 10px;border-radius:var(--rmd);}
.metric{flex:1;background:var(--bs);border-radius:var(--rmd);padding:10px;text-align:center;}
.metric .n{font-size:20px;font-weight:500;}
.metric .l{font-size:12px;color:var(--ts);}
.reset{font-size:12px;color:var(--tt);background:none;border:none;}
#modebar{display:flex;gap:6px;margin-bottom:14px;}
.mb{flex:1;padding:8px 4px;font-size:13px;border:0.5px solid var(--bd);border-radius:var(--rmd);background:transparent;color:var(--ts);}
.mb.on{background:var(--bs);color:var(--tp);font-weight:500;}
</style>
</head>
<body>
<div class="wrap">
<h1><span class="dot">&#9824;</span>Poker 暗記</h1>
<div id="modebar"></div>
<div id="app"></div>
<div style="text-align:center;margin-top:16px;"><button class="reset" onclick="pkReset()">進捗をリセット</button></div>
</div>
<script>
(function(){
var CARDS=[
{q:"オーバーペア vs アンダーペアのEQ（AA vs KK）は？",a:"約 80 : 20",tag:"EQ"},
{q:"2オーバー vs アンダーペア（AK vs 22）のEQは？ 通称は？",a:"約 50 : 50（フリップ）",tag:"EQ"},
{q:"2オーバー vs 2アンダーのスーテッドコネクター（AK vs 54s）のEQは？",a:"約 60 : 40",tag:"EQ"},
{q:"ドミネート（AK vs AQ）のEQは？",a:"約 75 : 25",tag:"EQ"},
{q:"2倍4倍の法則とは？",a:"リバーのみ＝アウツ×2 / ターン+リバー＝アウツ×4",tag:"EQ"},
{q:"NLHの全スターティングコンボ数は？",a:"1326",tag:"コンボ"},
{q:"ポケットペア1種のコンボ数は？",a:"6",tag:"コンボ"},
{q:"アンペアハンド1種のコンボ数は？（内訳も）",a:"16（スーテッド4 / オフ12）",tag:"コンボ"},
{q:"ポケットペアのコンボはブロッカーでどう減る？",a:"6 → 1枚で3 → 2枚で1",tag:"コンボ"},
{q:"33%ベットへの適正フォールド頻度は？",a:"約30%",tag:"フロップ"},
{q:"50%ベットへの適正フォールド頻度は？",a:"約40%",tag:"フロップ"},
{q:"75%ベットへの適正フォールド頻度は？",a:"約50%",tag:"フロップ"},
{q:"125%ベットへの適正フォールド頻度は？",a:"約60%",tag:"フロップ"},
{q:"ポット50%ベットの適正VB比は？（ブラフ割合も）",a:"3:1（ブラフ25%）",tag:"VB比"},
{q:"フォールドのEVは？",a:"いかなるスポットでも常に0",tag:"理論"},
{q:"α（必要ブラフ成功率）の式は？",a:"ベット ÷ トータルポット（＝1−MDF）",tag:"理論"},
{q:"MDF（最低ディフェンス頻度）の式は？",a:"ポット ÷(ポット+ベット)＝ 1−α",tag:"理論"},
{q:"ポラライズドレンジとは？",a:"強い手と弱い手の2極（中間はコールに残す）",tag:"レンジ"},
{q:"リニアレンジとは？",a:"強い順に選んだレンジ（形を指す語、ナッツを含むとは限らない）",tag:"レンジ"},
{q:"コンデンスドレンジとは？",a:"中程度だけ（キャップの一部で上下が欠ける）",tag:"レンジ"},
{q:"マージドレンジとは？",a:"強・中・弱を全部（GTOの大部分はこれ）",tag:"レンジ"},
{q:"キャップドレンジとは？",a:"強い手を持っていないレンジ（上限が限られる）",tag:"レンジ"},
{q:"エクイティ（EQ）とは？",a:"その時点でオールインした場合のポットシェア率（≒勝率）",tag:"概念"},
{q:"EQR（エクイティ実現性）とは？",a:"持つEQのうち実際どれだけ実現されるか。オールイン=100%が基準",tag:"概念"},
{q:"インディファレントとは？",a:"複数アクションのEVが等しい状態（＝境界）",tag:"概念"},
{q:"純粋戦略と混合戦略の違いは？",a:"純粋=1アクション100%（最高EV）/ 混合=複数を頻度で（全部同EV）",tag:"概念"},
{q:"ブロッカーとは？",a:"特定のハンドのコンボ数を減らすカード",tag:"概念"},
{q:"ドミネートとは？",a:"1枚共有しキッカーが上（AK vs AQ）。約75:25",tag:"概念"},
{q:"最もアンダーリアライズされやすいハンドの強さは？",a:"中程度のハンド（強い手にペイオフ・弱い手に降りられる板挟み）",tag:"概念"},
{q:"オープンレンジが狭くなる条件は？ なぜ？",a:"後ろの人数が多いほど狭い。強い手への放銃を避けるため",tag:"プリフロップ"},
{q:"オープンサイズを上げると、レンジはどう変わる？",a:"狭くなり、A/Kブロッカー持ち（3bet耐性）に寄る",tag:"プリフロップ"},
{q:"3betの2つの目的は？",a:"スチール（降ろして回収）と、強い手でバリュー",tag:"プリフロップ"},
{q:"3betレンジの広さを決める2要因は？（影響の大小も）",a:"相手のオープン幅（大）と後ろの人数（小）",tag:"プリフロップ"},
{q:"どのポジションからも3betできるハンドは？",a:"AQo+ / KTs+ / JJ+",tag:"プリフロップ"},
{q:"バリュー4bet / ブラフ4betの代表は？",a:"バリュー=QQ+/A5o、ブラフ=AJs〜KTsの4マス（+A5s）",tag:"プリフロップ"},
{q:"BBブラフ3betのスーテッド下限の暗記法は？",a:"UTG=K / HJ=K / CO=Q / BTN=Q / SB=J（〜T）のローs",tag:"プリフロップ"},
{q:"高レイキ環境とアンティ環境、レンジはどう変わる？",a:"高レイキ→タイト・スチール寄り / アンティ→ワイド（特にBB）",tag:"プリフロップ"},
{q:"マルチウェイで控えめ/積極にすべきハンドは？",a:"控えめ=Axs・SC（ドミネート）/ 積極=ポケットペア（セット）",tag:"プリフロップ"},
{q:"CB戦略を予想する3変数は？",a:"①エクイティ/ナッツ優位 ②ダイナミック/スタティック ③ペイオフリスク",tag:"フロップ"},
{q:"エクイティ優位とナッツ優位、それぞれどのCB戦略？",a:"エクイティ優位→レンジベット / ナッツ優位→ポラー（大サイズ）",tag:"フロップ"},
{q:"レンジベットが成立する条件は？",a:"相手にトラッシュハンドが多い（Aハイ/Kハイで成立しやすい）",tag:"フロップ"},
{q:"ポラーCBの発生条件と特徴的なサイズは？",a:"ナッツアドバンテージ。ジオメトリックサイズ（リバーオールインへ）",tag:"フロップ"},
{q:"3betポットCBの型（Aハイ/Kハイ/Q-Jハイ/10以下）は？",a:"20%広く / 33%レンジ / 50%打ち分け / 75%ポラー",tag:"フロップ"},
{q:"3betポットで色なしポケットをどう扱う？",a:"タフコールしない。色あり（セットがクリーン）を優先ディフェンス",tag:"フロップ"},
{q:"ターンのレンジ推定3手順は？",a:"プリフロップレンジ→フロップのアクションで絞る→ターンカードで進展",tag:"ターン"},
{q:"オーバーベットプローブの発生条件は？",a:"chk-chk後、ストレート/フラッシュ/ペア未完成（IPがキャップ）",tag:"ターン"},
{q:"ターンのベットサイズは何を狙って決める？",a:"相手レンジの密度が高い帯をインディファレントにするサイズ",tag:"ターン"},
{q:"「頻度より◯◯を覚える」。◯◯は？ なぜ？",a:"境界（indifferent）。混合戦略の頻度ミスは罰されにくい",tag:"原則"},
{q:"ハンドの強さは何で決まる？",a:"相手のレンジ次第（絶対値でなく相対価値）",tag:"原則"},
{q:"AKQゲームが証明した「ポラーが強い」結論は？",a:"EQ互角でもEVは3倍。ポラー対コンデンスではポジション有利も消滅",tag:"原則"},
{q:"GTOとエクスプロイトの関係は？",a:"GTOは搾取されない盾。リークが見えたら捨ててエクスプロイト",tag:"原則"},
{q:"UTGオープンの境界（下限）ハンドは？",a:"ATo/KJo/QJo（2broadway下限）、ポケ5以下は低頻度、Kxs=K5sまで、A3s=indifferent",tag:"プリフロ境界"},
{q:"HJオープンの境界ハンドは？",a:"A9o、KT/QT/JT=indifferent、ポケ4から、suited下限8xs",tag:"プリフロ境界"},
{q:"COオープンの境界ハンドは？",a:"Axo=A9/A8/A5（A5は飛び地）、2broadwayピュア、suited下限7xs、Q5s",tag:"プリフロ境界"},
{q:"BTNオープンの境界ハンドは？",a:"A3o+、オフ下限9xo、ポケ全ピュア、suited下限6xs、Qxロー全/J5・J4s",tag:"プリフロ境界"},
{q:"A5が飛び地でオープンされる理由は？",a:"ホイール（A2345）で最高キッカー。A6/A7より価値が高い瞬間がある",tag:"プリフロ境界"},
{q:"状況で混ぜる（境界の）3betハンドは？",a:"KJo+/JTs+/Axs/ローポケット（バランス・キャップ回避用）",tag:"プリフロ境界"},
{q:"SBオープンレンジの特徴は？",a:"≒BTN（リンプ頻度あり）。後ろ1人OOPと後ろ2人IPの長短が相殺",tag:"プリフロ境界"},
{q:"BTN vs BB、フロップ A72r（ドライAハイ）。あなたBTN、c-betする？",a:"★争点。GTO/ドラマ=レンジベット肯定。HHP=相手がスロープレイするのでチェックバックして情報を取る。卓が下手に受けるならチェックバック寄り",tag:"スポット"},
{q:"BTN vs BB、King94に33%CB被弾、AJo（バックドアFD付き）。守る？",a:"守る。33%CBの適正フォールドは下位30%。AJoはエースハイで下位30%に入らない。バックドアFD付きなら優先度↑（#11）",tag:"スポット"},
{q:"BTN vs BB、AK5、あなたBTNで5ヒット（ボトムペア）。リバーまでブラフに使う？",a:"使う。5を持つと相手のツーペア/トリップスのコンボが減る＝ブロッカーが優秀。ショーダウンバリューよりブロッカー優先（#15）",tag:"スポット"},
{q:"CO vs BTN 3betポット、K43ツートーン、33%CB被弾、8ポケ（色なし）。コール？",a:"フォールド。色なしポケットはセット時にフラッシュ被りで濁る。色あり優先、色なしはフォールド（#18）",tag:"スポット"},
{q:"BTN vs BB、KJ4r、フロップchk-chk、ターン3c。あなたBB、どうする？",a:"オーバーベットプローブ（250%等）。IPのチェックレンジがキャップ（強い手はCBに回る）。セットがナッツの未完成ボード（#21）",tag:"スポット"},
{q:"後ろにバリ型おじいちゃん（超タイト・3betはAKsのみ）。自分のオープンは？",a:"広げてスチール（降りやすい）。ただし3betされたらオーバーフォールド。limpレイズは降りる（#08）",tag:"スポット"},
{q:"AK vs 22、プリフロでオールイン。EQは？",a:"約50:50（フリップ）。2オーバー vs アンダーペア（#23）",tag:"スポット"},
{q:"マルチウェイ（3人）で A5s。参加する？",a:"控えめに。FD無しのAxsはキッカー上のAxsにドミネートされやすい。マルチウェイはポケットペアの方が向く（#10）",tag:"スポット"},
{q:"レンジ推定：CO vs BTN 3betポット、King94→33%CB→COコール→ターン10s。COのレンジは？（ポケ／2broadwayオフ／2broadways／フロップのフォールド率／ターンの進展）",a:"ポケ=10s以下を等頻度コール / 2broadwayオフ=ほぼ全フォールド / 2broadways=AQs・AJs・KQsがメイン / フロップは約40%フォールド（エクイティ差）/ ターン10sで KTs・T9s=2ペア、QTs・JTs=10ヒット+SDに進展（#19）",tag:"穴埋め"},
{q:"レンジ推定：BTN vs BB SRP、Q94r→50%CB→BBコール→ターン2c。BBの残存レンジは？",a:"50%CBに約40%フォールド→残るのは下限のポケット付近。ペア=4/9/Qヒット、ドロー=KJ/KT/JT（Q-9間SD）+バックドア付きAハイ。ターン2cはブランクで大きな変化なし（クイーンデュースが2ペア化する程度）（#19）",tag:"穴埋め"},
{q:"レンジ推定：UTG vs BB、A73ツートーン→33%CB→BBコール→ターン5h。BBのレンジは？",a:"エクイティ差で約45%フォールド（ハーツ無しのKハイ以下は壊滅）。残る=ハーツ持ちポケット/3ヒット/7ヒット/Aヒット、ドロー=45s/56s/46s（→ターン5hで進展・完成）。KThh等はフラッシュ完成（#19）",tag:"穴埋め"}
];
var KEY='pokerSRS_v1';
var IV={1:1,2:2,3:4,4:8,5:16};
function cid(q){var h=0;for(var i=0;i<q.length;i++)h=(h*31+q.charCodeAt(i))|0;return 'c'+(h>>>0).toString(36);}
CARDS.forEach(function(c){c.id=cid(c.q);});
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch(e){return {};}}
function save(p){try{localStorage.setItem(KEY,JSON.stringify(p));}catch(e){}}
function tstr(){return new Date().toISOString().slice(0,10);}
function addD(n){var d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
var prog=load();
var t=tstr();
var mode=localStorage.getItem('pokerMode')||'all';
function pool(){if(mode==='spot')return CARDS.filter(function(c){return c.tag==='スポット';});if(mode==='fill')return CARDS.filter(function(c){return c.tag==='穴埋め';});if(mode==='memo')return CARDS.filter(function(c){return c.tag!=='スポット'&&c.tag!=='穴埋め';});return CARDS;}
var queue=[],idx=0,showA=false;
function buildQueue(){var P=pool();var due=P.filter(function(c){return prog[c.id]&&prog[c.id].due<=t;});var fresh=P.filter(function(c){return !prog[c.id];}).slice(0,8);queue=due.concat(fresh);idx=0;showA=false;}
function boxes(){var P=pool();var b={};P.forEach(function(c){var r=prog[c.id];var k=r?r.box:0;b[k]=(b[k]||0)+1;});return b;}
window.pkFlip=function(){showA=true;render();};
window.pkGrade=function(g){var c=queue[idx];var r=prog[c.id]||{box:1};var box=r.box||1;if(g===3)box=Math.min(box+1,5);else if(g===1)box=1;prog[c.id]={box:box,due:addD(IV[box])};save(prog);idx++;showA=false;render();};
window.pkReset=function(){if(confirm('進捗をリセットしますか？')){prog={};save(prog);buildQueue();render();}};
window.pkMode=function(m){mode=m;localStorage.setItem('pokerMode',m);buildQueue();renderBar();render();};
function gb(g,label,sym,col,bg){return '<button class="grade" onclick="pkGrade('+g+')" style="background:'+bg+';color:'+col+';"><span class="gsym">'+sym+'</span>'+label+'</button>';}
function renderBar(){
 var modes=[['all','すべて'],['memo','暗記'],['spot','スポット'],['fill','穴埋め']];
 document.getElementById('modebar').innerHTML=modes.map(function(m){return '<button class="mb'+(mode===m[0]?' on':'')+'" onclick="pkMode(\''+m[0]+'\')">'+m[1]+'</button>';}).join('');
}
function render(){
 var fill=mode==='fill';var spot=mode==='spot';
 if(idx>=queue.length){
  var b=boxes();var P=pool();var learning=P.length-(b[0]||0)-(b[5]||0);
  app.innerHTML='<div class="card" style="padding:1.75rem 1.25rem;text-align:center;">'
   +'<div style="font-size:34px;color:var(--tk);margin-bottom:8px;">&#10003;</div>'
   +'<p style="font-size:18px;font-weight:500;margin:0 0 4px;">今日のぶん、完了</p>'
   +'<p style="font-size:14px;color:var(--ts);margin:0 0 16px;">'+queue.length+' 枚やりました</p>'
   +'<div style="display:flex;gap:8px;">'
   +'<div class="metric"><div class="l">定着</div><div class="n">'+(b[5]||0)+'</div></div>'
   +'<div class="metric"><div class="l">学習中</div><div class="n">'+learning+'</div></div>'
   +'<div class="metric"><div class="l">未学習</div><div class="n">'+(b[0]||0)+'</div></div>'
   +'</div></div>';
  return;
 }
 var c=queue[idx];
 var prompt=fill?'考えてからタップ':(spot?'どうする？ 考えてからタップ':'タップで答え');
 var head='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'
  +'<span style="font-size:13px;color:var(--ts);">'+(idx+1)+' / '+queue.length+'</span>'
  +'<span class="tag">'+(c.tag||'')+'</span></div>';
 if(!showA){
  app.innerHTML=head+'<div class="card" onclick="pkFlip()" style="padding:2rem 1.25rem;min-height:150px;display:flex;flex-direction:column;justify-content:center;">'
   +'<p style="font-size:'+(fill||spot?'17px':'18px')+';line-height:1.6;margin:0;">'+c.q+'</p>'
   +'<p style="font-size:13px;color:var(--tt);margin:18px 0 0;">'+prompt+'</p></div>';
 } else {
  app.innerHTML=head+'<div class="card" style="padding:1.5rem 1.25rem;min-height:150px;">'
   +'<p style="font-size:15px;line-height:1.5;margin:0 0 12px;color:var(--ts);">'+c.q+'</p>'
   +'<div style="border-top:0.5px solid var(--bd);padding-top:14px;"><p style="font-size:'+(fill||spot?'16px':'19px')+';line-height:1.6;margin:0;font-weight:500;">'+c.a+'</p></div></div>'
   +'<div style="display:flex;gap:8px;margin-top:12px;">'
   +gb(1,'忘れた','&#215;','var(--td)','var(--bgd)')
   +gb(2,'微妙','&#8722;','var(--tw)','var(--bgw)')
   +gb(3,'覚えた','&#10003;','var(--tk)','var(--bgk)')
   +'</div>';
 }
}
var app=document.getElementById('app');
buildQueue();renderBar();render();
})();
</script>
</body>
</html>
