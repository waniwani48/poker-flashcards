{tag:"フロップCB暗記",board:"KsKh7c",sc:"★SRP・ペア盤は『ペアの高さ』で純レンジベット↔混合に割れる（KK7 vs 883・実測）",steps:[{q:"KK7と883はどちらもペア盤。AAの打てる頻度と理由の違いは？",a:"KK7=AA約99.7%(純レンジベット・チェック0.1%)、883=AA約48%(混合・チェック半分)。決定軸は『ペアの高さ』。高ペアKK7はBBがKxをほぼ持たずPFRが圧倒的支配→打ち切る。低ペア883は静的でPFRが支配しきれず価値手もチェック。『ペアボード』と一括りにできない"}]},
{tag:"フロップCB暗記",sc:"★SRP・位置勾配の統一則（UTG/HJ/BTN 3ポジ実測）",steps:[{q:"レンジ優位盤(A/K/Q高・接続・ナッツ優位)でUTG/HJ/BTNのチェック頻度の大小は？例外2つは？",a:"UTG ≤ HJ < BTN の単調（タイトなほどチェック少＝レンジ優位が濃い）。例: A72r 30.9/47.7/57.5、KQJ 2.5/10.2/53.6。例外①中ペア883は逆転(51/48/33・BTNが打つ)②動的976は位置中立(全ポジ約48-49)。『広い＝チェック多』はHJ→BTNで真、タイト端UTGはさらに減る"}]},

  var bad=0,ok=0;it.steps.forEach(function(s,i){if(fGrades[i]==='✗')bad++;if(fGrades[i]==='◎')ok++;});
  var head=bad===0?'全レンジ読み切った。この精度を体に残せ。':(bad<=1?'惜しい。あと一歩でレンジが見えてる。':'まだ粗い。ここのレンジを重点的に詰めろ。');
  body='<div style="text-align:center;padding:6px 0;"><div style="font-size:15px;color:var(--text);font-weight:500;margin-bottom:3px;">'+head+'</div><div style="font-size:12px;color:var(--muted);margin-bottom:16px;">◎ '+ok+' ／ ✗ '+bad+' ・ この手順を毎回やれ</div><div style="display:flex;gap:8px;"><button class="btn" style="flex:1;padding:13px;font-size:13px;background:rgba(217,96,63,.12);color:#e8917a;border-color:rgba(217,96,63,.3);" onclick="OWN.fdone(false)">また鍛える</button><button class="btn" style="flex:1;padding:13px;font-size:13px;background:rgba(58,160,136,.12);color:#5fc3a8;border-color:rgba(58,160,136,.3);" onclick="OWN.fdone('+(bad===0)+')">次へ</button></div></div>';
 }else{
  var s=it.steps[fsi];
  if(!fRevealed){
   var hint=hintFor(s.q);
   var grps=chipsFor(s.q);if(chipTab>=grps.length)chipTab=0;
   var tabbar=grps.map(function(g,gi){var on=gi===chipTab;return '<button onclick="OWN.chipTab('+gi+')" style="flex:0 0 auto;font-size:11.5px;padding:5px 11px;border-radius:7px 7px 0 0;border:.5px solid '+(on?'rgba(201,162,39,.4)':'rgba(255,255,255,.10)')+';border-bottom:none;background:'+(on?'rgba(201,162,39,.14)':'transparent')+';color:'+(on?'var(--gold)':'#8b8e97')+';font-family:inherit;">'+g.l+'</button>';}).join('');
   var chips=grps[chipTab].c.map(function(t){var del=t==='削除';return '<button onclick="OWN.fins(\''+t.replace(/'/g,"\\'")+'\')" style="flex:0 0 auto;font-size:14px;padding:9px 13px;border-radius:8px;border:.5px solid rgba(255,255,255,.16);background:'+(del?'rgba(217,96,63,.14)':'rgba(255,255,255,.05)')+';color:'+(del?'#e8917a':'#dcdee3')+';font-family:inherit;">'+(del?'⌫':t===' '?'␣':t)+'</button>';}).join('');
   body='<div style="background:var(--surf);border:.5px solid rgba(255,255,255,.08);border-radius:14px;padding:18px 16px;"><div style="font-size:16px;line-height:1.6;margin-bottom:8px;">'+(fsi+1)+'. '+s.q+'</div><div style="font-size:11.5px;line-height:1.5;color:#8b8e97;margin-bottom:10px;background:rgba(255,255,255,.03);border-radius:8px;padding:7px 10px;">✍️ '+hint.g+'</div><textarea id="fin" placeholder="'+hint.ph+'" style="width:100%;min-height:54px;background:#14171e;color:var(--text);border:.5px solid rgba(255,255,255,.14);border-radius:10px;padding:10px;font-family:inherit;font-size:14px;line-height:1.5;resize:none;"></textarea><div style="margin-top:11px;"><div style="display:flex;flex-wrap:wrap;gap:4px;">'+tabbar+'</div><div style="display:flex;flex-wrap:wrap;gap:6px;padding:10px;border:.5px solid rgba(201,162,39,.2);border-radius:0 10px 10px 10px;">'+chips+'</div></div><button class="btn" style="width:100%;margin-top:11px;padding:13px;font-size:14px;color:var(--gold);border-color:rgba(201,162,39,.4);" onclick="OWN.fcheck()">答え合わせ</button></div>';
  }else{
   body='<div style="background:var(--surf);border:.5px solid rgba(201,162,39,.25);border-radius:14px;padding:18px 16px;"><div style="font-size:13px;color:var(--muted);margin-bottom:12px;">'+(fsi+1)+'. '+s.q+'</div><div style="font-size:10px;letter-spacing:1px;color:#85888f;text-transform:uppercase;margin-bottom:4px;">あなたの推定</div><div style="font-size:14px;line-height:1.5;color:#c7c9cf;margin-bottom:12px;background:#14171e;border-radius:8px;padding:9px 11px;">'+(fInputs[fsi]||'（空欄）')+'</div><div style="font-size:10px;letter-spacing:1px;color:#85888f;text-transform:uppercase;margin-bottom:4px;">正解</div><div style="font-size:15px;line-height:1.6;color:var(--gold);font-weight:500;margin-bottom:4px;">'+s.a+'</div>'+judgeHtml(fsi)+'<div style="font-size:12px;color:var(--muted);margin:14px 0 8px;">採点して次へ（Claude判定済みならその採点でOK）</div><div style="display:flex;gap:7px;"><button class="btn" style="flex:1;padding:11px 2px;font-size:13px;color:#5fc3a8;border-color:rgba(58,160,136,.3);" onclick="OWN.fgrade(\'◎\')">◎ ほぼ</button><button class="btn" style="flex:1;padding:11px 2px;font-size:13px;color:#d8b54a;border-color:rgba(201,162,39,.3);" onclick="OWN.fgrade(\'△\')">△ 半分</button><button class="btn" style="flex:1;padding:11px 2px;font-size:13px;color:#e8917a;border-color:rgba(217,96,63,.3);" onclick="OWN.fgrade(\'✗\')">✗ ズレ</button></div></div>';
  }
 }
 root.innerHTML=sessHead()
  +'<div style="background:rgba(201,162,39,.07);border:.5px solid rgba(201,162,39,.28);border-radius:12px;padding:12px 14px;margin-bottom:16px;"><div style="font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:5px;">'+(it.tag==='穴埋め'?'レンジ推定':it.tag)+'</div><div style="font-size:13px;line-height:1.55;color:#dcdee3;">'+it.sc+'</div>'+boardBlock(it)+'</div>'
  +'<div style="flex:1;overflow:auto;-webkit-overflow-scrolling:touch;">'+filledHtml+body+'</div>';
 var ta=document.getElementById('fin');if(ta){ta.value=fInputs[fsi]||'';}
}
renderHome();
})();
</script>
</body>
</html>
